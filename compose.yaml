name: s4rciv

services:
  db:
    image: postgres:18.4-trixie
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      # PostgreSQL 18 changed the image VOLUME to /var/lib/postgresql
      # (PGDATA defaults to /var/lib/postgresql/18/docker). Mount the parent.
      - db_data:/var/lib/postgresql
    # Not published to the host: reachable only by other services as `db:5432`.
    # Use `docker compose exec db psql ...` for ad-hoc access.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  migrate:
    image: arigaio/atlas:1.2.1-alpine
    depends_on:
      db:
        condition: service_healthy
    # Run non-root: the atlas binary is mode ---------x, so executing it as root
    # under cap_drop:ALL fails (no CAP_DAC_OVERRIDE); as "other" the exec bit applies.
    user: "65532:65532"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      HOME: /tmp
    secrets:
      - db_password
    volumes:
      - ./db/migrations:/migrations:ro
    # Build the connection URL inside the container so the password is read from
    # the mounted secret and never appears in an environment variable or image.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - 'atlas migrate apply --url "postgres://$${POSTGRES_USER}:$$(cat /run/secrets/db_password)@db:5432/$${POSTGRES_DB}?sslmode=disable" --dir "file:///migrations"'
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    restart: "no"

  api:
    build:
      context: ./services/api
      target: api
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      API_PORT: "8080"
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      DB_PASSWORD_FILE: /run/secrets/db_password
      USER_AGENT: ${USER_AGENT}
    secrets:
      - db_password
    ports:
      - "127.0.0.1:${API_HOST_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "/app/api", "-healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    restart: unless-stopped

  collector:
    build:
      context: ./services/api
      target: collector
    depends_on:
      migrate:
        condition: service_completed_successfully
      differ:
        condition: service_started
    # Command side (CQRS): discovers/polls sources and projects read models.
    # The egov-law diff usecase calls the differ over Connect-RPC at DIFFER_URL.
    # Default command is the daemon; override for one-shot ops, e.g.
    #   docker compose run --rm collector discover --from 2024-01-01 --until 2024-01-31
    command: ["run"]
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      DB_PASSWORD_FILE: /run/secrets/db_password
      USER_AGENT: ${USER_AGENT}
      DIFFER_URL: http://differ:9090
    secrets:
      - db_password
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    restart: unless-stopped

  # Second command-side daemon for the egov-law source. The kokkai and egov-law
  # collectors run in parallel because they target different hosts; each enforces
  # its own per-source serial+interval rate limit (DISCIPLINE §1), so they never
  # issue concurrent requests to the same source. NOTE: like the kokkai daemon this
  # only POLLS the existing watch list; new resources still need a `discover` run.
  collector-egov:
    build:
      context: ./services/api
      target: collector
    depends_on:
      migrate:
        condition: service_completed_successfully
      differ:
        condition: service_started
    command: ["--source", "egov-law", "run"]
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      DB_PASSWORD_FILE: /run/secrets/db_password
      USER_AGENT: ${USER_AGENT}
      DIFFER_URL: http://differ:9090
    secrets:
      - db_password
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    restart: unless-stopped

  differ:
    build:
      context: ./services/differ
    # Stateless structural-diff service (ADR-000005): no database, no secrets.
    # The collector calls it over Connect-RPC; reachable on the compose network as
    # differ:9090. It only computes 法令標準XML diffs + classification from bytes.
    environment:
      DIFFER_PORT: "9090"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    restart: unless-stopped

  web:
    build:
      context: ./web
    depends_on:
      - api
    environment:
      HOST: 0.0.0.0
      PORT: "3000"
      BODY_SIZE_LIMIT: "1M"
      # SSR/BFF: the web server reaches the read-only API over the compose network;
      # the API itself is never published to the browser (D1).
      API_URL: http://api:8080
    ports:
      - "127.0.0.1:${WEB_HOST_PORT:-3000}:3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped

volumes:
  db_data:

secrets:
  db_password:
    file: ./secrets/db_password.txt
