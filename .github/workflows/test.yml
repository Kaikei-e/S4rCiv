# Reproducible test suite (ADR-000016). CI runs the SAME `make` targets a third
# party runs locally — the host toolchain (Go 1.26, protoc, Atlas) lives in
# containers, so a clean ubuntu runner with Docker reproduces every layer.
name: test

on:
  push:
    branches: [main]
  pull_request:

env:
  POSTGRES_USER: s4rciv
  POSTGRES_DB: s4rciv
  USER_AGENT: s4rciv-ci

jobs:
  # Fast, hermetic unit layers (no DB orchestration). Each builds its own test image.
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Provision DB secret (compose mounts ./secrets/db_password.txt)
        run: mkdir -p secrets && echo "ci-only-not-a-real-secret" > secrets/db_password.txt
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - run: make unit-go
      - run: make unit-rust
      - run: make unit-web
      - if: always()
        run: make down

  # Contract checks: proto byte-drift guard + buf breaking vs the base ref.
  cdc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # buf breaking needs history to resolve the baseline ref
      - uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1
        with:
          setup_only: true
      - run: make proto-drift
      - name: buf breaking vs base
        run: |
          BASE="origin/${{ github.base_ref || 'main' }}"
          cd services/api && buf breaking --against "../../.git#ref=${BASE},subdir=services/api/proto"

  # Go drivers vs a real migrated Postgres (template-DB-per-test, race detector).
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Provision DB secret
        run: mkdir -p secrets && echo "ci-only-not-a-real-secret" > secrets/db_password.txt
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - run: make integration
      - if: always()
        run: make down

  # Browser E2E vs the real, deterministically seeded stack.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Provision DB secret
        run: mkdir -p secrets && echo "ci-only-not-a-real-secret" > secrets/db_password.txt
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
      - name: Enable pnpm
        run: corepack enable
      - name: Install web deps + Playwright browser
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm exec playwright install --with-deps chromium
      - run: make e2e
      - if: always()
        run: make down
      - if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
